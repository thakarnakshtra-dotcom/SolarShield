name: SolarShield Data Collector

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours, UTC — matches CHECK_EVERY in solarshield_v6.py
  workflow_dispatch:         # lets you trigger it manually from the Actions tab too

permissions:
  contents: write            # needed so the workflow can commit the updated CSV back

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run collector
        run: python collector.py

      - name: Commit and push updated data
        run: |
          git config user.name "solarshield-bot"
          git config user.email "actions@users.noreply.github.com"
          git add live_data.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-collect: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
